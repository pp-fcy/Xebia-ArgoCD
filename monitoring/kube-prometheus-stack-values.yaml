crds:
  # Disable CRD management inside the Helm release.
  # These CRDs exceed Kubernetes' 256 KB annotation limit when applied via
  # kubectl apply (client-side), so they are installed separately using
  # `kubectl apply --server-side` which avoids last-applied-configuration.
  enabled: false

grafana:
  enabled: true
  adminPassword: admin #this is not a good practice, it should be stored in a secret or vault
  defaultDashboardsEnabled: false
  podAnnotations:
    argocd.argoproj.io/sync-wave: "2"
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          folder: Webapp
          type: file
          options:
            path: /var/lib/grafana/dashboards/default

prometheus:
  # Move the Prometheus CR itself to wave 3 — after the Operator Deployment
  # (wave 2). Without this ArgoCD applies the CR at wave 0, waits for it to
  # be Healthy, but it can never be Healthy because the Operator that creates
  # the StatefulSet hasn't deployed yet (it's at wave 2). This deadlocks all
  # wave 1 resources (Istio DestinationRule / VirtualService / Gateway).
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  prometheusSpec:
    podMetadata:
      annotations:
        argocd.argoproj.io/sync-wave: "3"
    # Scrape all ServiceMonitors across all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    retention: 24h
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-storage
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    # Prometheus runs as nobody (UID 65534). The hostPath PV is owned by root,
    # so without fsGroup Kubernetes won't chown the mount and Prometheus panics
    # with "permission denied" on /prometheus/queries.active at startup.
    securityContext:
      runAsNonRoot: true
      runAsUser: 65534
      runAsGroup: 65534
      fsGroup: 65534
    resources:
      requests:
        memory: 400Mi
        cpu: 100m
      limits:
        memory: 800Mi
        cpu: 500m

alertmanager:
  enabled: false
kubeStateMetrics:
  enabled: true
  podAnnotations:
    argocd.argoproj.io/sync-wave: "2"

nodeExporter:
  enabled: true
  podAnnotations:
    argocd.argoproj.io/sync-wave: "2"

prometheusOperator:
  # Admission webhooks require cert-manager or a working cert Job. On kind
  # neither exists, so the admission-create Job runs in PreSync but the
  # admission-patch PostSync Job never fires (sync crashes before PostSync).
  # Disabling both removes the PreSync/PostSync Job dependency cycle entirely.
  admissionWebhooks:
    enabled: false
  tls:
    enabled: false
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  podAnnotations:
    argocd.argoproj.io/sync-wave: "2"
