apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: test-fincore
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: git@github.com:pp-fcy/Coinmerce-task-test.git
      targetRevision: main
      ref: values
    - repoURL: git@github.com:pp-fcy/Coinmerce-task-test.git
      path: k8s/bootstrap
      targetRevision: main
    # Installs networking.istio.io CRDs before istio/manifests.yaml
    - repoURL: https://istio-release.storage.googleapis.com/charts
      chart: base
      targetRevision: 1.21.0
      helm:
        releaseName: istio-base
        values: |
          defaultRevision: default
    - repoURL: git@github.com:pp-fcy/Coinmerce-task-test.git
      path: k8s/webapp
      targetRevision: main
    - repoURL: git@github.com:pp-fcy/Coinmerce-task-test.git
      path: istio
      targetRevision: main
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 59.0.0
      helm:
        valueFiles:
          - $values/monitoring/kube-prometheus-stack-values.yaml
    - repoURL: git@github.com:pp-fcy/Coinmerce-task-test.git
      path: k8s/monitoring
      targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: fincore
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      # Skip dry-run validation for resources whose CRD is not yet installed.
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
