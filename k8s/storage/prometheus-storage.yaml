---
# StorageClass — static local provisioner for kind.
# kind has no dynamic volume provisioner, so we use "no-provisioner" and
# create the PV manually below. Immediate binding means the PVC binds as
# soon as it is created (before the pod is scheduled).
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-storage
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: Immediate
reclaimPolicy: Retain
---
# PersistentVolume — 5 Gi hostPath on the kind node.
# hostPath is the only viable local storage type in kind: the "node" is
# actually a Docker container, so /data/prometheus lives inside that
# container and survives pod restarts as long as the kind cluster is up.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: prometheus-pv
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  hostPath:
    # DirectoryOrCreate: kind creates the directory if it doesn't exist.
    path: /data/prometheus
    type: DirectoryOrCreate
