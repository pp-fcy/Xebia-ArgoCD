---
# Horizontal Pod Autoscaler — scale on CPU
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fincore-app
  namespace: fincore
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fincore-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
# PodDisruptionBudget — always keep at least 1 pod running
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fincore-app
  namespace: fincore
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: fincore-app
---
# NetworkPolicy — default deny, allow only what's needed
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fincore-app
  namespace: fincore
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  podSelector:
    matchLabels:
      app: fincore-app
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from anywhere to the webapp container port.
    - ports:
        - protocol: TCP
          port: 8080
    # Allow kubelet → Istio pilot-agent health-check port.
    # Istio rewrites httpGet probes to port 15020; without this rule the
    # rewritten liveness/readiness probes are silently dropped.
    - ports:
        - protocol: TCP
          port: 15020
  egress:
    # Allow DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow egress only to explicitly selected destination pods.
    #
    # To allow the webapp to talk to a given Service, label that Service's pods with:
    #   fincore.io/allow-from-webapp: "true"
    #
    # Example (Service "payments" backed by Deployment "payments"):
    #   kubectl -n fincore label deployment payments fincore.io/allow-from-webapp="true"
    #
    # (NetworkPolicies can't directly select Services, only pods/namespaces/IPBlocks.)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: fincore
          podSelector:
            matchLabels:
              fincore.io/allow-from-webapp: "true"
