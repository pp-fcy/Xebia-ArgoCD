apiVersion: apps/v1
kind: Deployment
metadata:
  name: fincore-app
  namespace: fincore
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app: fincore-app
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fincore-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: fincore-app
        version: v1
      annotations:
        # Hold the app container until the Istio proxy (Envoy) is fully ready.
        # Without this, the kubelet fires the liveness probe while iptables rules
        # are still being set up → port 8080 appears closed → connection refused.
        proxy.istio.io/config: '{"holdApplicationUntilProxyStarts": true}'
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: fincore-app

      terminationGracePeriodSeconds: 30

      containers:
        - name: fincore-app
          # Image is updated automatically by the CI golden path (ci.yaml job: deploy).
          # Tag is pinned to sha-<commit> on every push to main; ArgoCD then auto-syncs.
          image: ghcr.io/pp-fcy/fincore-hello:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          # Resource limits
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"

          # Container-level security
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

          # Liveness — server.py returns 200 on /healthz
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3

          # Readiness — same endpoint; pod only receives traffic when healthy
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 2
            timeoutSeconds: 3

          # Drain connections before pod terminates
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]
